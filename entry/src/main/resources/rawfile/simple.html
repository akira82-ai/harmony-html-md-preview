<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单HTML测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        h2 { color: #34495e; margin-top: 30px; }
        h3 { color: #7f8c8d; }
        a { color: #3498db; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .placeholder-img {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 300px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            margin: 10px 0;
        }
        ul, ol { margin: 10px 0; padding-left: 30px; }
        li { margin: 5px 0; }
        hr { border: none; border-top: 2px solid #ecf0f1; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>简单HTML测试页面</h1>
    
    <h2>基本段落</h2>
    <p>这是一个简单的段落，用于测试基本的文本渲染功能。</p>
    <p>这是另一个段落，包含<strong>粗体</strong>和<em>斜体</em>文本。</p>
    
    <h2>链接测试</h2>
    <p>这是一个<a href="javascript:void(0)" onclick="alert('外部链接已禁用')">外部链接（已禁用）</a>。</p>
    <p>这是一个<a href="#section1">页内锚点</a>。</p>
    
    <h2 id="section1">列表测试</h2>
    <h3>无序列表</h3>
    <ul>
        <li>列表项 1</li>
        <li>列表项 2</li>
        <li>列表项 3</li>
    </ul>
    
    <h3>有序列表</h3>
    <ol>
        <li>第一项</li>
        <li>第二项</li>
        <li>第三项</li>
    </ol>
    
    <h2>图片测试</h2>
    <p>这里应该显示一张图片：</p>
    <div class="placeholder-img">📷 测试图片占位符</div>
    
    <h2>分割线</h2>
    <hr>
    <p>分割线测试完成。</p>
</body>
</html>
